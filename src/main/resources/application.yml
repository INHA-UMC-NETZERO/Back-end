server:
  port: 8080

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://inhabada-identifier.c054eoe2obxd.us-east-1.rds.amazonaws.com:5432/postgres?sslmode=require}
    username: ${SPRING_DATASOURCE_USERNAME:inhabada}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: create
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  sql:
    init:
      mode: always
      schema-locations: classpath:db/embedding_migration.sql

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

aws:
  region: us-east-1
  s3:
    bucket-name: netzero-15-s3
    public-base-url: https://netzero-15-s3.s3.us-east-1.amazonaws.com
  bedrock:
    model-id: anthropic.claude-3-haiku-20240307-v1:0
    max-tokens: 1024

app:
  session:
    ttl-days: 7
  feed:
    default-page-size: 20
  matching:
    similarity-threshold: 0.7
    max-results: 5
  embedding:
    url: ${EMBEDDING_SERVER_URL:https://seoki.cloud/v1/embeddings}
    model: ${EMBEDDING_MODEL:bge-m3}
    dimension: 1024
    timeout-seconds: 5
  webview:
    base-url: https://inha-bada.app
